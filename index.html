<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>INSOMNIO | Entradas</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <section class="hero" aria-label="INSOMNIO">
        <div class="hero-content">
          <img class="hero-logo" src="assets/insomnio-logo-transparent.png" alt="Logo de INSOMNIO" />
          <h1>INSOMNIO</h1>
          <p class="event-meta">4TH JULIO | PARQUE SOFO | DESDE LAS 22 HRS</p>
          <button class="hero-button" id="goToTickets" type="button">Comprar Entradas</button>
        </div>
      </section>

      <section class="ticket-app" id="ticketsSection">
        <div class="tickets-panel" aria-label="Entradas disponibles">
        <header class="panel-header">
          <div class="panel-title">
            <span class="step-badge">1</span>
            <h2>Entradas</h2>
          </div>
          <img class="panel-logo" src="assets/insomnio-logo-transparent.png" alt="" aria-hidden="true" />
        </header>

        <div class="ticket-list" id="ticketList"></div>

        <footer class="checkout-bar" aria-live="polite">
          <div>
            <strong id="totalAmount">$0</strong>
            <span>Total a pagar</span>
          </div>
          <button class="checkout-button" id="openBuyerForm" type="button" disabled>Comprar Entradas</button>
        </footer>
        </div>
      </section>
    </main>

    <div class="modal-backdrop" id="buyerModal" hidden>
      <section class="buyer-modal" role="dialog" aria-modal="true" aria-labelledby="buyerTitle">
        <div class="modal-header">
          <div>
            <span class="modal-kicker">Datos del comprador</span>
            <h2 id="buyerTitle">Finalizar compra</h2>
          </div>
          <button class="icon-button" id="closeBuyerForm" type="button" aria-label="Cerrar formulario">x</button>
        </div>

        <div class="order-summary" id="orderSummary"></div>

        <form id="buyerForm" novalidate>
          <label class="field">
            <span>Nombre y apellido</span>
            <input id="fullName" type="text" autocomplete="name" placeholder="Ej: Camila Soto" required />
            <small class="error" id="nameError"></small>
          </label>

          <label class="field">
            <span>RUT</span>
            <input id="rut" type="text" inputmode="text" placeholder="Ej: 12345678-9" required />
            <small class="error" id="rutError"></small>
          </label>

          <label class="field">
            <span>Número de teléfono</span>
            <div class="phone-input">
              <span class="phone-prefix">+56</span>
              <input id="phone" type="tel" inputmode="numeric" autocomplete="tel" maxlength="9" placeholder="912345678" required />
            </div>
            <small class="error" id="phoneError"></small>
          </label>

          <div class="attendees-section" id="attendeesSection" hidden>
            <div class="attendees-heading">
              <span>Personas adicionales</span>
              <p>El comprador queda asociado a la primera entrada. Completa el nombre de las demás personas.</p>
            </div>
            <div class="attendees-list" id="attendeesList"></div>
            <small class="error" id="attendeesError"></small>
          </div>

          <button class="whatsapp-button" type="submit">Continuar por WhatsApp</button>
        </form>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
